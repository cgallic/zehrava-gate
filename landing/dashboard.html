<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zehrava Gate — Approval Queue</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #6366f1; --purple-dim: #3730a3; --green: #22c55e;
      --red: #ef4444; --amber: #f59e0b;
      --bg: #0a0a0a; --bg2: #111; --bg3: #1a1a1a;
      --border: #222; --border2: #2a2a2a; --text: #f0f0f0; --muted: #888;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.85em; }
    a { color: var(--purple); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* HEADER */
    header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: rgba(10,10,10,0.96); position: sticky; top: 0; z-index: 100; }
    .header-logo { font-size: 1rem; font-weight: 800; letter-spacing: -0.02em; }
    .header-logo span { color: var(--purple); }
    .header-right { display: flex; align-items: center; gap: 1.25rem; font-size: 0.8rem; }
    .refresh-indicator { color: var(--muted); }
    .refresh-dot { display: inline-block; width: 6px; height: 6px; background: var(--green); border-radius: 50%; margin-right: 4px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* API KEY BOX */
    .api-key-box { margin: 1rem 1.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1rem; display: flex; align-items: center; gap: 1rem; font-size: 0.8rem; }
    .api-key-label { color: var(--muted); flex-shrink: 0; }
    .api-key-value { font-family: monospace; color: var(--purple); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .copy-btn { background: var(--bg3); border: 1px solid var(--border2); color: var(--muted); padding: 0.25rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-family: inherit; flex-shrink: 0; }
    .copy-btn:hover { color: var(--text); }

    /* TABS */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 1.5rem; margin-top: 0.5rem; }
    .tab { padding: 0.65rem 1rem; font-size: 0.875rem; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; white-space: nowrap; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--purple); font-weight: 600; }
    .tab-count { display: inline-block; background: var(--purple); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 0.1rem 0.45rem; border-radius: 999px; margin-left: 0.4rem; vertical-align: middle; }
    .tab-count.zero { background: var(--bg3); color: var(--muted); }

    /* MAIN */
    main { padding: 1.5rem; }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
    .empty-state h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }

    /* TABLE */
    .table-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; padding: 0.75rem 1rem; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg3); }
    tbody td { padding: 0.85rem 1rem; font-size: 0.85rem; vertical-align: middle; }
    .td-mono { font-family: monospace; font-size: 0.78rem; color: var(--muted); }
    .td-agent { font-weight: 600; }
    .td-dest { color: var(--muted); font-family: monospace; font-size: 0.78rem; }

    /* STATUS BADGES */
    .badge { display: inline-block; font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.55rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-pending { background: rgba(245,158,11,0.15); color: var(--amber); }
    .badge-approved { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-blocked { background: rgba(239,68,68,0.15); color: var(--red); }
    .badge-delivered { background: rgba(99,102,241,0.15); color: var(--purple); }
    .badge-expired { background: rgba(136,136,136,0.15); color: var(--muted); }

    /* ACTION BUTTONS */
    .actions { display: flex; gap: 0.4rem; }
    .btn-approve { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); padding: 0.3rem 0.75rem; border-radius: 5px; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .btn-approve:hover { background: rgba(34,197,94,0.25); }
    .btn-reject { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.25); padding: 0.3rem 0.75rem; border-radius: 5px; font-size: 0.78rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .btn-reject:hover { background: rgba(239,68,68,0.2); }

    /* AUDIT EXPAND */
    .audit-row td { padding: 0; }
    .audit-expand { background: var(--bg3); padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: none; }
    .audit-expand.open { display: block; }
    .audit-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.75rem; }
    .audit-event { display: flex; gap: 1rem; padding: 0.4rem 0; border-bottom: 1px solid var(--border); font-size: 0.78rem; }
    .audit-event:last-child { border-bottom: none; }
    .ae-time { color: var(--muted); font-family: monospace; flex-shrink: 0; width: 200px; }
    .ae-type { color: var(--purple); font-weight: 600; flex-shrink: 0; width: 160px; font-family: monospace; }
    .ae-actor { color: var(--muted); }
    .block-reason { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.8rem; color: var(--red); margin-top: 0.5rem; font-family: monospace; }

    /* TOAST */
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 0.75rem 1.25rem; font-size: 0.875rem; z-index: 999; transition: all 0.2s; opacity: 0; transform: translateY(8px); pointer-events: none; max-width: 320px; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .toast.error { border-color: rgba(239,68,68,0.4); color: var(--red); }

    /* REJECT MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 420px; }
    .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .modal textarea { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); padding: 0.75rem; border-radius: 6px; font-size: 0.875rem; font-family: inherit; resize: vertical; min-height: 80px; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }
    .btn-cancel { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.875rem; }
    .btn-confirm-reject { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-family: inherit; font-size: 0.875rem; font-weight: 700; }

    /* MOBILE — card layout instead of table */
    @media(max-width:768px) {
      header { padding: 0.875rem 1rem; }
      .header-logo { font-size: 0.875rem; }
      .header-right { gap: 0.75rem; font-size: 0.75rem; }
      .header-right a:first-of-type { display: none; } /* hide "Try demo" on mobile */
      .api-key-box { margin: 0.75rem 1rem; flex-wrap: wrap; gap: 0.5rem; }
      .api-key-value { width: 100%; font-size: 0.72rem; }
      .tabs { padding: 0 0.75rem; overflow-x: auto; }
      .tab { padding: 0.6rem 0.75rem; font-size: 0.8rem; }
      main { padding: 0.75rem 1rem; }
      /* Hide table on mobile */
      .table-wrap table { display: none; }
      /* Show cards instead */
      .card-list { display: flex; flex-direction: column; gap: 0.75rem; }
      .prop-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; }
      .prop-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
      .prop-card-agent { font-weight: 700; font-size: 0.9rem; }
      .prop-card-meta { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.78rem; color: var(--muted); margin-bottom: 0.75rem; }
      .prop-card-meta span { display: flex; gap: 0.4rem; }
      .prop-card-meta .ml { min-width: 80px; }
      .prop-card-actions { display: flex; gap: 0.5rem; }
      .prop-card-actions .btn-approve,
      .prop-card-actions .btn-reject { flex: 1; justify-content: center; padding: 0.55rem; font-size: 0.82rem; }
      .prop-card-audit { margin-top: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.75rem; }
      .modal { max-width: calc(100vw - 2rem); }
    }
    @media(min-width:769px) {
      .card-list { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-logo">Zehrava <span>Gate</span> — Approval Queue</div>
  <div class="header-right">
    <span class="refresh-indicator"><span class="refresh-dot"></span>Live</span>
    <a href="/demo">Try demo →</a>
    <a href="/">← zehrava.com</a>
  </div>
</header>

<div class="api-key-box">
  <span class="api-key-label">Demo API key</span>
  <span class="api-key-value" id="apiKeyDisplay">gate_sk_1e03e5dd975da4edde747eb5a3de95a22fb0d70e346eb0af</span>
  <button class="copy-btn" onclick="copyKey()">Copy</button>
  <span style="color:var(--muted);font-size:0.75rem">Use this key to propose from the demo page or curl</span>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('pending_approval')">Pending <span class="tab-count zero" id="count-pending">0</span></div>
  <div class="tab" onclick="switchTab('approved')">Approved <span class="tab-count zero" id="count-approved">0</span></div>
  <div class="tab" onclick="switchTab('delivered')">Delivered <span class="tab-count zero" id="count-delivered">0</span></div>
  <div class="tab" onclick="switchTab('blocked')">Blocked <span class="tab-count zero" id="count-blocked">0</span></div>
  <div class="tab" onclick="switchTab('')">All</div>
</div>

<main>
  <div id="tableContainer"></div>
</main>

<!-- Reject modal -->
<div class="modal-overlay" id="rejectModal">
  <div class="modal">
    <h3>Reject proposal</h3>
    <textarea id="rejectReason" placeholder="Reason for rejection (optional)"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm-reject" onclick="confirmReject()">Reject proposal</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = 'gate_sk_1e03e5dd975da4edde747eb5a3de95a22fb0d70e346eb0af';
const API_BASE = '/v1';
let currentTab = 'pending_approval';
let pendingRejectId = null;
let refreshTimer = null;
let expandedRows = new Set();

function headers() {
  return { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' };
}

async function api(method, path, body) {
  const res = await fetch(API_BASE + path, {
    method, headers: headers(),
    body: body ? JSON.stringify(body) : undefined
  });
  return res.json();
}

function copyKey() {
  navigator.clipboard.writeText(API_KEY);
  showToast('API key copied', 'success');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

function statusBadge(status) {
  const map = {
    pending_approval: 'badge-pending',
    approved: 'badge-approved',
    blocked: 'badge-blocked',
    delivered: 'badge-delivered',
    expired: 'badge-expired'
  };
  const label = status === 'pending_approval' ? 'pending' : status;
  return `<span class="badge ${map[status] || ''}">${label}</span>`;
}

function timeAgo(iso) {
  if (!iso) return '—';
  const diff = Date.now() - new Date(iso).getTime();
  const s = Math.floor(diff / 1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

function shortId(id) {
  return id ? `<code>${id.slice(0, 16)}…</code>` : '—';
}

async function loadProposals() {
  const url = currentTab ? `/proposals?status=${currentTab}&limit=100` : '/proposals?limit=100';
  const data = await api('GET', url);
  const proposals = data.proposals || [];

  // Update counts (fetch all tabs in background)
  updateCounts();

  const container = document.getElementById('tableContainer');
  if (!proposals.length) {
    container.innerHTML = `<div class="empty-state"><h3>No ${currentTab || ''} proposals</h3><p style="margin-top:.5rem;font-size:.85rem">Proposals will appear here when agents submit them.</p><p style="margin-top:1rem"><a href="/demo">Run a demo scenario →</a></p></div>`;
    return;
  }

  const tableRows = proposals.map(p => {
    const isExpanded = expandedRows.has(p.id);
    const actions = p.status === 'pending_approval'
      ? `<div class="actions"><button class="btn-approve" onclick="approve('${p.id}',event)">✓ Approve</button><button class="btn-reject" onclick="openReject('${p.id}',event)">✗ Reject</button></div>`
      : `<a href="#" onclick="toggleAudit('${p.id}',event)" style="font-size:.78rem;color:var(--muted)">Audit trail</a>`;
    return `
      <tr onclick="toggleAudit('${p.id}')">
        <td class="td-mono">${shortId(p.id)}</td>
        <td class="td-agent">${p.agent_name || 'unknown'}</td>
        <td class="td-dest">${p.destination || '—'}</td>
        <td class="td-mono">${p.policy_id || '—'}</td>
        <td style="text-align:right;color:var(--muted)">${p.record_count || '—'}</td>
        <td style="color:var(--muted)">${timeAgo(p.created_at)}</td>
        <td>${statusBadge(p.status)}</td>
        <td onclick="event.stopPropagation()">${actions}</td>
      </tr>
      <tr class="audit-row" id="audit-${p.id}">
        <td colspan="8">
          <div class="audit-expand ${isExpanded ? 'open' : ''}" id="audit-content-${p.id}">
            <div class="audit-title">Audit trail — ${p.id}</div>
            ${p.block_reason ? `<div class="block-reason">Blocked: ${p.block_reason}</div>` : ''}
            <div id="audit-events-${p.id}" style="margin-top:.5rem">Loading…</div>
          </div>
        </td>
      </tr>`;
  }).join('');

  const cards = proposals.map(p => {
    const isPending = p.status === 'pending_approval';
    const auditEl = expandedRows.has(p.id)
      ? `<div class="prop-card-audit" id="audit-content-mobile-${p.id}"><div class="audit-title">Audit trail</div><div id="audit-events-mobile-${p.id}">Loading…</div></div>`
      : '';
    return `
      <div class="prop-card" onclick="toggleAuditMobile('${p.id}')">
        <div class="prop-card-top">
          <span class="prop-card-agent">${p.agent_name || 'unknown'}</span>
          ${statusBadge(p.status)}
        </div>
        <div class="prop-card-meta">
          <span><span class="ml">Destination</span><code>${p.destination || '—'}</code></span>
          <span><span class="ml">Policy</span><code>${p.policy_id || '—'}</code></span>
          <span><span class="ml">Records</span>${p.record_count || '—'}</span>
          <span><span class="ml">Time</span>${timeAgo(p.created_at)}</span>
          ${p.block_reason ? `<span style="color:var(--red)"><span class="ml">Blocked</span>${p.block_reason}</span>` : ''}
        </div>
        ${isPending ? `<div class="prop-card-actions" onclick="event.stopPropagation()">
          <button class="btn-approve" onclick="approve('${p.id}',event)">✓ Approve</button>
          <button class="btn-reject" onclick="openReject('${p.id}',event)">✗ Reject</button>
        </div>` : `<a href="#" onclick="event.stopPropagation();toggleAuditMobile('${p.id}')" style="font-size:.78rem;color:var(--muted)">View audit trail</a>`}
        ${auditEl}
      </div>`;
  }).join('');

  container.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>Agent</th><th>Destination</th><th>Policy</th>
            <th style="text-align:right">Records</th><th>Time</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="card-list">${cards}</div>
    </div>`;

  // Load audit for expanded rows
  for (const id of expandedRows) {
    loadAudit(id);
  }
}

async function loadAudit(proposalId) {
  const data = await api('GET', `/audit/${proposalId}`);
  const el = document.getElementById(`audit-events-${proposalId}`);
  if (!el) return;
  if (!data.events || !data.events.length) {
    el.innerHTML = '<span style="color:var(--muted);font-size:.78rem">No events</span>';
    return;
  }
  el.innerHTML = data.events.map(e =>
    `<div class="audit-event">
      <span class="ae-time">${e.created_at ? e.created_at.replace('T',' ').slice(0,19) : '—'}</span>
      <span class="ae-type">${e.event_type}</span>
      <span class="ae-actor">${e.actor || '—'}</span>
    </div>`
  ).join('');
}

function toggleAudit(id, e) {
  if (e) e.stopPropagation();
  const content = document.getElementById(`audit-content-${id}`);
  if (!content) return;
  if (expandedRows.has(id)) {
    expandedRows.delete(id);
    content.classList.remove('open');
  } else {
    expandedRows.add(id);
    content.classList.add('open');
    loadAudit(id);
  }
}

async function toggleAuditMobile(id) {
  const card = document.getElementById(`audit-content-mobile-${id}`);
  if (card) {
    card.remove();
    expandedRows.delete(id);
    return;
  }
  expandedRows.add(id);
  // Re-render to show audit section
  await loadProposals();
  // Load events
  const data = await api('GET', `/audit/${id}`);
  const el = document.getElementById(`audit-events-mobile-${id}`);
  if (!el) return;
  if (!data.events || !data.events.length) { el.textContent = 'No events'; return; }
  el.innerHTML = data.events.map(e =>
    `<div class="audit-event"><span class="ae-type">${e.event_type}</span><span class="ae-actor">${e.actor || ''}</span></div>`
  ).join('');
}

async function approve(proposalId, e) {
  if (e) e.stopPropagation();
  const btn = e ? e.target : null;
  if (btn) btn.textContent = '…';
  try {
    const res = await api('POST', '/approve', { proposalId });
    if (res.status === 'approved') {
      showToast(`✓ Approved — delivery token issued`, 'success');
    } else {
      showToast(res.error || 'Unexpected response', 'error');
    }
  } catch (err) {
    showToast('Failed to approve', 'error');
  }
  loadProposals();
}

function openReject(proposalId, e) {
  if (e) e.stopPropagation();
  pendingRejectId = proposalId;
  document.getElementById('rejectReason').value = '';
  document.getElementById('rejectModal').classList.add('open');
}

function closeModal() {
  pendingRejectId = null;
  document.getElementById('rejectModal').classList.remove('open');
}

async function confirmReject() {
  const reason = document.getElementById('rejectReason').value || 'Rejected from dashboard';
  try {
    await api('POST', '/reject', { proposalId: pendingRejectId, reason });
    showToast('Proposal rejected', 'error');
  } catch (err) {
    showToast('Failed to reject', 'error');
  }
  closeModal();
  loadProposals();
}

async function updateCounts() {
  const statuses = ['pending_approval', 'approved', 'delivered', 'blocked'];
  for (const s of statuses) {
    try {
      const data = await api('GET', `/proposals?status=${s}&limit=100`);
      const count = (data.proposals || []).length;
      const el = document.getElementById(`count-${s.replace('pending_approval','pending')}`);
      if (el) {
        el.textContent = count;
        el.className = `tab-count ${count === 0 ? 'zero' : ''}`;
      }
    } catch {}
  }
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', [
      'pending_approval','approved','delivered','blocked',''
    ][i] === tab);
  });
  expandedRows.clear();
  loadProposals();
}

function startAutoRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => loadProposals(), 10000);
}

// Init
loadProposals();
startAutoRefresh();
</script>
</body>
</html>
