<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0d1117"/>

  <!-- Z lettermark — top bar -->
  <line x1="21" y1="27" x2="79" y2="27" stroke="#818cf8" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Z lettermark — diagonal (top-right to bottom-left) -->
  <line x1="75" y1="27" x2="25" y2="73" stroke="url(#zd)" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Z lettermark — bottom bar -->
  <line x1="21" y1="73" x2="79" y2="73" stroke="#6366f1" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Gate checkpoint — the approval moment on the diagonal -->
  <circle cx="50" cy="50" r="6.5" fill="#0d1117"/>
  <circle cx="50" cy="50" r="5" fill="#22c55e"/>
  <circle cx="50" cy="50" r="2.5" fill="#4ade80"/>

  <defs>
    <linearGradient id="zd" x1="75" y1="27" x2="25" y2="73" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
</svg>
