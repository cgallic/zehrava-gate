[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "zehrava-gate"
version = "0.1.0"
description = "Zehrava Gate Python SDK — the safe commit layer for AI agents"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.8"
keywords = ["ai", "agents", "approval", "governance", "commit", "checkpoint", "policy", "langchain", "langgraph", "crewai", "autogen"]
authors = [{name = "Zehrava", email = "connor@kaicalls.com"}]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
]

[project.urls]
Homepage = "https://zehrava.com"
Documentation = "https://zehrava.com/docs"
Repository = "https://github.com/cgallic/zehrava-gate"
Issues = "https://github.com/cgallic/zehrava-gate/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["zehrava_gate*"]
