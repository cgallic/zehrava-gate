id: schema-test
destinations:
  - test.api
field_checks:
  - path: "email"
    required: true
    pattern: "^[^@]+@[^@]+\\.[^@]+$"
  - path: "amount"
    max: 100
    min: 1
  - path: "items"
    max_length: 3
environments:
  production:
    require_approval: always
  staging:
    auto_approve_under: 10
auto_approve_under: 5
block_if_terms:
  - "forbidden"